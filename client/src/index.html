<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Evenizer | Premium Event Management</title>
  <base href="./"> 
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Manrope', 'sans-serif'] },
          colors: {
            evPurple: '#7b3fe4',
            evPink: '#ec4899',
            evDark: '#0b0b15'
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #0b0b15; margin: 0; overflow-x: hidden; }
    /* Hide scrollbar but allow scrolling */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0b0b15; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(#7b3fe4, #ec4899); border-radius: 10px; }
  </style>
</head>

</html>
