<!-- TOP BAR -->
<div class="top-bar">
  <div class="brand-block">
    <div class="brand-logo">E</div>
    <div>
      <h1>Staff Dashboard</h1>
      <div class="welcome-text">Welcome, {{ username }}</div>
    </div>
  </div>

  <div class="nav-actions">
    <!--  Only tasks tab -->
    <button class="nav-btn" [class.active]="activeTab==='tasks'" (click)="setTab('tasks')">
      Tasks
    </button>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </div>
</div>

<div class="container">

  <!-- ================= TASKS TAB ================= -->
  <section *ngIf="activeTab === 'tasks'" class="section-card">

    <div class="section-head">
      <h2>My Assigned Tasks</h2>
      <span class="pill" *ngIf="tasks?.length">Total: {{ tasks.length }}</span>
    </div>

    <div class="hint" *ngIf="loading">Loading tasks...</div>
    <div class="hint" *ngIf="!loading && tasks.length === 0">No tasks assigned yet.</div>

    <!-- TABLE -->
    <table class="data-table" *ngIf="!loading && tasks.length > 0">
      <tr>
        <th>Event</th>
        <th>Task</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>

      <tr *ngFor="let t of tasks">
        <td>{{ t.event?.title || '—' }}</td>
        <td>{{ t.description || '—' }}</td>
        <td>
          <span class="chip"
                [ngClass]="{
                  'chip-upcoming': t.status === 'INITIATED',
                  'chip-ongoing': t.status === 'IN_PROGRESS',
                  'chip-completed': t.status === 'COMPLETED'
                }">
            {{ t.status }}
          </span>
        </td>

        <td>
          <div class="row-actions">
            <button class="btn-outline"
                    type="button"
                    (click)="updateStatus(t, 'IN_PROGRESS')"
                    [disabled]="t.status === 'COMPLETED'">
              Start
            </button>

            <button class="primary"
                    type="button"
                    (click)="updateStatus(t, 'COMPLETED')"
                    [disabled]="t.status === 'COMPLETED'">
              Mark Done
            </button>
          </div>
        </td>
      </tr>
    </table>

  </section>

</div>
