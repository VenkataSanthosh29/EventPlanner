<div class="auth-container">
  <div class="auth-card">
    <h2>Forgot Password</h2>

    <p class="hint">Enter your registered email to receive an OTP.</p>

    <p class="success-message" *ngIf="message">{{ message }}</p>
    <p class="error-message" *ngIf="error">{{ error }}</p>

    <!-- ✅ Use formGroup properly -->
    <form [formGroup]="form">

      <!-- STEP 1: EMAIL -->
      <div *ngIf="step === 'email'">
        <label>Email</label>
        <input
          type="email"
          formControlName="email"
          placeholder="Enter your email"
          (blur)="checkEmailExists()"
        />

        <small class="error"
          *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">
          Email is required
        </small>

        <small class="error"
          *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">
          Enter a valid email
        </small>

        <small class="error"
          *ngIf="form.get('email')?.touched && form.get('email')?.hasError('emailNotFound')">
          Invalid email
        </small>

        <button
          class="primary"
          type="button"
          (click)="sendOtp()"
          [disabled]="form.get('email')?.invalid || !emailExists || checkingEmail"
        >
          {{ checkingEmail ? 'Checking...' : 'Send OTP' }}
        </button>

        <button class="secondary" type="button" (click)="backToLogin()">Back</button>
      </div>

      <!-- STEP 2: OTP -->
      <div *ngIf="step === 'otp'">
        <label>Enter OTP</label>
        <input
          type="text"
          maxlength="6"
          inputmode="numeric"
          formControlName="otp"
          placeholder="6-digit OTP"
        />

        <button
          class="primary"
          type="button"
          (click)="verifyOtp()"
          [disabled]="(form.get('otp')?.value || '').length !== 6"
        >
          Verify OTP
        </button>

        <button
          class="secondary"
          type="button"
          (click)="sendOtp()"
          [disabled]="resendCooldown > 0"
        >
          {{ resendCooldown > 0 ? 'Resend in ' + resendCooldown + 's' : 'Resend OTP' }}
        </button>

        <button class="secondary" type="button" (click)="backToLogin()">Back</button>
      </div>

      <!-- STEP 3: RESET -->
      <div *ngIf="step === 'reset'">
        <label>New Password</label>
        <input
          type="password"
          formControlName="newPassword"
          placeholder="New password"
        />

        <label>Confirm Password</label>
        <input
          type="password"
          formControlName="confirmPassword"
          placeholder="Confirm password"
        />

        <small class="error"
          *ngIf="form.get('newPassword')?.touched && form.get('newPassword')?.invalid">
          Password must be at least 8 characters
        </small>

        <button
          class="primary"
          type="button"
          (click)="resetPassword()"
          [disabled]="form.get('newPassword')?.invalid || form.get('confirmPassword')?.invalid"
        >
          Update Password
        </button>

        <button class="secondary" type="button" (click)="backToLogin()">Back</button>
      </div>

    </form>
  </div>
</div>
