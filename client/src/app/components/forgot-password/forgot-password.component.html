<div class="ep-login-root" [ngClass]="currentTheme">
  <div class="ep-login-orb"></div>
  <div class="ep-dot-layer ep-dot-layer-back"></div>
  <div class="ep-dot-layer ep-dot-layer-front"></div>

  <div class="ep-login-container">
    <div class="ep-login-side">
      <p class="ep-badge">Account Recovery</p>
      <h1>Don't worry, we'll get you back in.</h1>
      <p class="ep-sub">
        Follow the steps to securely reset your password and continue planning your amazing events.
      </p>
    </div>

    <div class="ep-card-shell">
      <div class="ep-auth-card">
        <h2>Forgot Password</h2>
        
        <p class="ep-message success" *ngIf="message">{{ message }}</p>
        <p class="ep-error" *ngIf="error">{{ error }}</p>

        <form [formGroup]="form">
          
          <div *ngIf="step === 'email'" class="ep-step-container">
            <div class="ep-form-group">
              <label for="email">Registered Email</label>
              <input
                id="email"
                type="email"
                formControlName="email"
                placeholder="Enter your email"
                (blur)="checkEmailExists()"
              />
              <small class="ep-input-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('required')">Email is required</small>
              <small class="ep-input-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('email')">Enter a valid email</small>
              <small class="ep-input-error" *ngIf="form.get('email')?.touched && form.get('email')?.hasError('emailNotFound')">Account not found</small>
            </div>

            <button class="ep-primary-btn" type="button" (click)="sendOtp()" 
              [disabled]="form.get('email')?.invalid || !emailExists || checkingEmail">
              {{ checkingEmail ? 'Checking...' : 'Send OTP' }}
            </button>
            <button class="ep-secondary-btn" type="button" (click)="backToLogin()">Back to Login</button>
          </div>

          <div *ngIf="step === 'otp'" class="ep-step-container">
            <div class="ep-form-group">
              <label for="otp">Verification Code</label>
              <input
                id="otp"
                type="text"
                maxlength="6"
                inputmode="numeric"
                formControlName="otp"
                placeholder="6-digit OTP"
              />
            </div>

            <button class="ep-primary-btn" type="button" (click)="verifyOtp()" 
              [disabled]="(form.get('otp')?.value || '').length !== 6">
              Verify OTP
            </button>
            
            <div class="ep-otp-actions">
              <button class="ep-text-btn" type="button" (click)="sendOtp()" [disabled]="resendCooldown > 0">
                {{ resendCooldown > 0 ? 'Resend in ' + resendCooldown + 's' : 'Resend Code' }}
              </button>
              <button class="ep-text-btn" type="button" (click)="step = 'email'">Change Email</button>
            </div>
          </div>

          <div *ngIf="step === 'reset'" class="ep-step-container">
            <div class="ep-form-group">
              <label for="newPassword">New Password</label>
              <input id="newPassword" type="password" formControlName="newPassword" placeholder="Minimum 8 characters" />
            </div>

            <div class="ep-form-group">
              <label for="confirmPassword">Confirm New Password</label>
              <input id="confirmPassword" type="password" formControlName="confirmPassword" placeholder="Repeat password" />
            </div>

            <button class="ep-primary-btn" type="button" (click)="resetPassword()" 
              [disabled]="form.get('newPassword')?.invalid || form.get('confirmPassword')?.invalid">
              Update Password
            </button>
          </div>

        </form>
      </div>
    </div>
  </div>
</div>
