<!-- OTP RESULT POPUP -->
<div class="otp-popup-backdrop" *ngIf="showOtpPopup">
  <div
    class="otp-popup"
    [class.success]="otpPopupSuccess"
    [class.error]="!otpPopupSuccess">
    <h3>{{ otpPopupSuccess ? 'Success' : 'Error' }}</h3>
    <p>{{ otpPopupMessage }}</p>
  </div>
</div>

<div class="auth-root" [ngClass]="currentTheme" (mousemove)="onMouseMove($event)">

  <!-- Cursor Orb -->
  <div class="auth-orb" #authOrb></div>

  <!-- Atmospheric Background -->
  <div class="dot-layer dot-layer-back"></div>
  <div class="dot-layer dot-layer-front"></div>

  <!-- Theme Toggle -->
  <button class="auth-theme-toggle" type="button" (click)="toggleTheme()">
    <span class="auth-theme-thumb" [ngClass]="currentTheme">
      <span class="auth-theme-icon">
        {{ currentTheme === 'night' ? '🌙' : '☀️' }}
      </span>
    </span>
  </button>

  <!-- Main Layout -->
  <div class="auth-container-outer">

    <!-- Left Panel -->
    <div class="auth-side">
      <span class="auth-badge">Create Account</span>
      <h1>Join the event experience.</h1>
      <p class="auth-sub">
        Set up your account in seconds and start planning, managing, or attending incredible events today.
      </p>
    </div>

    <!-- Card -->
    <div class="auth-card-shell">
      <div class="auth-card">

        <div class="auth-top-row">
          <a routerLink="/home" class="auth-home-btn">⬅ Home</a>
        </div>

        <h2>Register</h2>

        <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">

          <!-- Username -->
          <div class="form-group">
            <label>Username</label>
            <input formControlName="username" placeholder="Enter username">
          </div>

          <!-- Email -->
          <div class="form-group">
            <label>Email</label>
            <input type="email" formControlName="email" placeholder="Enter email">
          </div>

          <!-- Send OTP -->
          <button
            type="button"
            class="secondary"
            (click)="sendOtp()"
            [disabled]="resendCooldown > 0 || registrationForm.get('email')?.invalid">
            {{ resendCooldown > 0
              ? 'Resend OTP in ' + resendCooldown + 's'
              : (otpSent ? 'Resend OTP' : 'Send OTP') }}
          </button>

          <!-- OTP -->
          <div class="form-group" *ngIf="otpSent">
            <label>Verification Code</label>
            <input
              maxlength="6"
              inputmode="numeric"
              [(ngModel)]="otpValue"
              [ngModelOptions]="{ standalone: true }"
              (input)="onOtpInput()">

            <button
              type="button"
              class="primary"
              (click)="verifyOtp()"
              [disabled]="getCleanOtp().length !== 6">
              Verify OTP
            </button>
          </div>

          <!-- Password -->
          <div class="form-group">
            <label>Password</label>
            <div class="pw-wrapper">
              <input
                [type]="showPassword ? 'text' : 'password'"
                formControlName="password">
              <button type="button" class="pw-eye-btn" (click)="togglePassword()">
                {{ showPassword ? '🙈' : '👁️' }}
              </button>
            </div>
          </div>

          <!-- Role -->
          <div class="form-group">
            <label>Role</label>
            <select formControlName="role">
              <option value="">Select role</option>
              <option value="PLANNER">Event Planner</option>
              <option value="STAFF">Staff</option>
              <option value="CLIENT">Client</option>
            </select>
          </div>

          <button type="submit">Register</button>

          <p class="redirect">
            Already have an account?
            <a routerLink="/login">Login</a>
          </p>

        </form>
      </div>
    </div>
  </div>
</div>
