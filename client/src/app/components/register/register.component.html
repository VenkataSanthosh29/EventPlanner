<div class="auth-container">
  <h2>Register</h2>

  <form [formGroup]="registrationForm" (ngSubmit)="onSubmit()">

    <!-- Username -->
    <div class="form-group">
      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        formControlName="username"
        placeholder="Enter username"
      />

      <small class="error"
        *ngIf="registrationForm.get('username')?.touched &&
               registrationForm.get('username')?.invalid">
        Username is required
      </small>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        placeholder="Enter email"
      />

      <small class="error"
        *ngIf="registrationForm.get('email')?.touched &&
               registrationForm.get('email')?.invalid">
        Enter a valid email
      </small>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        placeholder="Enter password"
      />

      <small class="error"
        *ngIf="registrationForm.get('password')?.touched &&
               registrationForm.get('password')?.invalid">
        Password must be at least 8 characters
      </small>
    </div>

    <!-- Role -->
    <div class="form-group">
      <label for="role">Role</label>
      <select id="role" formControlName="role">
        <option value="">Select role</option>
        <option value="PLANNER">Event Planner</option>
        <option value="STAFF">Staff</option>
        <option value="CLIENT">Client</option>
      </select>

      <small class="error"
        *ngIf="registrationForm.get('role')?.touched &&
               registrationForm.get('role')?.invalid">
        Role is required
      </small>
    </div>

    <!-- Success -->
    <p class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </p>

    <!-- Error -->
    <p class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <!-- Submit -->
    <button type="submit" [disabled]="registrationForm.invalid">
      Register
    </button>

  </form>

  <!-- Navigation -->
  <p class="redirect">
    Already have an account?
    <a routerLink="/login">Login</a>
  </p>
</div>
