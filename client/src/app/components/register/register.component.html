<div class="auth-container">
  <form
    class="auth-card"
    [formGroup]="registrationForm"
    (ngSubmit)="onSubmit()"
  >
    <h2>Register</h2>

    <!-- Username -->
    <div class="form-group">
      <label>Username</label>
      <input formControlName="username" placeholder="Enter username">

      <small class="error" *ngIf="registrationForm.get('username')?.touched">
        <span *ngIf="registrationForm.get('username')?.hasError('required')">
          Username is required
        </span>
        <span *ngIf="registrationForm.get('username')?.hasError('usernameTaken')">
          Username already exists
        </span>
      </small>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="Enter email">

      <small class="error" *ngIf="registrationForm.get('email')?.touched">
        <span *ngIf="registrationForm.get('email')?.hasError('required')">
          Email is required
        </span>
        <span *ngIf="registrationForm.get('email')?.hasError('email')">
          Enter a valid email
        </span>
        <span *ngIf="registrationForm.get('email')?.hasError('emailTaken')">
          Email already exists
        </span>
      </small>
    </div>

    <!-- Send / Resend OTP -->
   <button
  type="button"
  class="secondary"
  (click)="sendOtp()"
  [disabled]="
    resendCooldown > 0 ||
    registrationForm.get('email')?.invalid ||
    registrationForm.get('email')?.hasError('emailTaken')
  "
>
  {{ resendCooldown > 0
    ? 'Resend OTP in ' + resendCooldown + 's'
    : (otpSent ? 'Resend OTP' : 'Send OTP') }}
</button>

    <!-- OTP Section -->
    <div class="form-group" *ngIf="otpSent">
      <label>Enter OTP</label>
      <input
        type="text"
        maxlength="6"
        inputmode="numeric"
        placeholder="6-digit OTP"
        [(ngModel)]="otpValue"
        [ngModelOptions]="{ standalone: true }"
        name="otp"
        (input)="onOtpInput()"
      >

      <button
        type="button"
        class="primary"
        (click)="verifyOtp()"
        [disabled]="getCleanOtp().length !== 6"
      >
        Verify OTP
      </button>
    </div>

    <!-- Password -->
    <div class="form-group">
      <label>Password</label>
      <input
        type="password"
        formControlName="password"
        placeholder="Enter password"
      >

      <small class="error"
        *ngIf="registrationForm.get('password')?.touched &&
               registrationForm.get('password')?.invalid">
        Password must be at least 8 characters
      </small>
    </div>

    <!-- Role -->
    <div class="form-group">
      <label>Role</label>
      <select formControlName="role">
        <option value="">Select role</option>
        <option value="PLANNER">Event Planner</option>
        <option value="STAFF">Staff</option>
        <option value="CLIENT">Client</option>
      </select>

      <small class="error"
        *ngIf="registrationForm.get('role')?.touched &&
               registrationForm.get('role')?.invalid">
        Role is required
      </small>
    </div>

    <!-- Messages -->
    <p class="success-message" *ngIf="successMessage">
      {{ successMessage }}
    </p>

    <p class="error-message" *ngIf="errorMessage">
      {{ errorMessage }}
    </p>

    <!-- Register -->
    <button
      type="submit"
      [disabled]="registrationForm.invalid"
    >
      Register
    </button>

    <!-- Navigation -->
    <p class="redirect">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>
  </form>
</div>
